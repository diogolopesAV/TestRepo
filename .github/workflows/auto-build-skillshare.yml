name: Auto-build Skillshare Hubs

on:
  pull_request:
    # Only trigger if files inside the skills directory change
    paths:
      - 'skills/**'
      - '!skills/**/scripts/**' # Optional: ignore script logic changes if they don't affect metadata
    branches:
      - main

jobs:
  build-and-commit:
    name: Generate Hub JSON and README
    runs-on: ubuntu-latest
    permissions:
      # Required to allow the Action to push commits back to the PR branch
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Check out the PR branch specifically, not the base branch
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Standard LTS for 2026
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Skillshare Hubs
        run: npm run build:skillshare-hubs

      - name: Commit and push updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(catalog): auto-generate skillshare hubs and docs"
          # Only commit the files we expect the build script to modify
          file_pattern: "skillshare-hub.json skills/**/external.json README.md docs/*.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
