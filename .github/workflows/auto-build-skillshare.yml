name: Auto-build Skillshare Hubs

on:
  pull_request:
    # Only trigger if files inside the skills directory change
    paths:
      - 'skills/**'
      - '!skills/**/scripts/**'
    branches:
      - main

jobs:
  build-and-commit:
    name: Generate Hub JSON
    runs-on: ubuntu-latest
    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the changed files back to the repository
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Check out the PR branch to prevent a detached HEAD state
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Skillshare Hubs
        run: npm run build:skillshare-hubs

      - name: Commit and push updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(catalog): auto-generate skillshare hubs"
          # Only commit the generated hub files
          file_pattern: "skillshare-hub.json hubs/*.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
