name: Auto-build Skillshare Hubs

on:
  pull_request:
    # Only trigger if files inside the skills directory change
    paths:
      - 'skills/**'
      - '!skills/**/scripts/**'
    branches:
      - main

jobs:
  build-and-commit:
    name: Generate Hub JSON
    runs-on: ubuntu-latest
    permissions:
      # Required to allow the Action to push commits back to the PR branch
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Check out the exact PR branch so we commit back to it
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Skillshare Hubs
        # Executes your repository's native script
        run: npm run build:skillshare-hubs

      - name: Commit and push updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(catalog): auto-generate skillshare hubs"
          # Strictly commit only the artifacts generated by the script
          file_pattern: "skillshare-hub.json hubs/*.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
