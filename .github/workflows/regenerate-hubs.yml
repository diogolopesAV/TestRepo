name: Regenerate skillshare hubs

# Runs after every merge to main. Regenerates skillshare-hub.json and
# hubs/*.json and commits them back if anything changed.
on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: regenerate-hubs
  cancel-in-progress: false

jobs:
  regenerate:
    name: Regenerate hub files
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: node scripts/build-skillshare-hubs.js

      - name: Commit regenerated hub files
        run: |
          git diff --quiet skillshare-hub.json hubs/ && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skillshare-hub.json hubs/
          git commit -m "chore: regenerate skillshare hub files [skip ci]"
          git push
